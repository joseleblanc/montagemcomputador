<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado | Telecurso Montagem de PC</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        :root { --azul: #003366; --amarelo: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--azul); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: white; color: #333; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); max-width: 500px; width: 90%; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--amarelo); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-ready { background: var(--amarelo); color: var(--azul); border: none; padding: 15px 30px; font-weight: bold; border-radius: 10px; cursor: pointer; display: inline-block; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        label { display: block; text-align: left; margin-top: 10px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div id="loading-area">
            <h2>Processando seu Certificado...</h2>
            <div class="loader"></div>
            <p>Estamos validando seus dados no sistema.</p>
        </div>

        <div id="ready-area" style="display:none;">
            <i class="fas fa-check-circle" style="color: #22c55e; font-size: 4rem;"></i>
            <h2>Tudo Pronto!</h2>
            <p id="msg-aluno"></p>

            <div id="dados-usuario" style="display:flex; flex-direction:column; gap:5px; margin:15px 0;">
                <label>Nome completo</label>
                <input id="input-nome" type="text" placeholder="Nome completo" />
                
                <label>CPF</label>
                <input id="input-cpf" type="text" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" />
                
                <label>Data de Nascimento</label>
                <input id="input-nasc" type="date" />
                
                <button class="btn-ready" id="btn-confirmar" onclick="confirmarDados()" style="background:#22c55e; color:white; display:block;">CONFIRMAR DADOS</button>
            </div>

            <div id="preview-area" style="display:none; text-align:left; margin:20px 0; padding:20px; border:1px solid #ccc; border-radius:10px; background:#f9f9f9;">
                <h3>Pré-visualização do Certificado</h3>
                <p><strong>Nome:</strong> <span id="preview-nome"></span></p>
                <p><strong>CPF:</strong> <span id="preview-cpf"></span></p>
                <p><strong>Data de Nascimento:</strong> <span id="preview-nasc"></span></p>
                <p><strong>Data de Emissão:</strong> <span id="preview-data"></span></p>
                <div style="margin-top:20px;">
                    <button class="btn-ready" onclick="editarDados()" style="background:#ffcc00; color:#003366;">Editar</button>
                    <button class="btn-ready" onclick="aprovarCertificado()" style="background:#22c55e; color:white;">Prosseguir</button>
                </div>
            </div>

            <button class="btn-ready" id="btn-download" onclick="gerarPDF()" style="display:none;">
                <i class="fas fa-file-download"></i> BAIXAR MEU CERTIFICADO
            </button>
        </div>

        <div id="qrcode-box" style="display:none;"></div>
    </div>

    <script>
        // Configurações do Supabase
        const SUPABASE_URL = 'https://ityqcemfbdzgsfmyisqc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_p6rMiOpEoL6smdIXgOaclQ_TNK0MwNA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dadosAluno = null;

        // Máscara de CPF em tempo real
        function mascaraCPF(i) {
            let v = i.value;
            v = v.replace(/\D/g, ""); 
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }

        async function prepararDados() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (!user) { window.location.href = 'index.html'; return; }

            const { data: perfil } = await _supabase.from('perfil_alunos').select('nome_completo').eq('id', user.id).single();
            const { data: prova } = await _supabase.from('progresso_alunos').select('nota').eq('user_id', user.id).eq('modulo_id', 100).single();

            if (!prova || prova.nota < 70) {
                alert("Você ainda não possui nota suficiente para o certificado.");
                window.location.href = 'modulos.html';
                return;
            }

            dadosAluno = {
                nome: perfil?.nome_completo || "Aluno do Telecurso",
                id: user.id
            };

            document.getElementById('loading-area').style.display = 'none';
            document.getElementById('ready-area').style.display = 'block';
            document.getElementById('input-nome').value = dadosAluno.nome;
            document.getElementById('msg-aluno').innerText = `Confirme seus dados para emissão.`;
        }

        function confirmarDados() {
            const nome = document.getElementById('input-nome').value.trim();
            const cpf = document.getElementById('input-cpf').value.trim();
            const nasc = document.getElementById('input-nasc').value;

            if (!nome || cpf.length < 14 || !nasc) {
                alert('Preencha os dados corretamente.');
                return;
            }

            // Formata data para o PDF (DD/MM/AAAA)
            const dataObj = new Date(nasc);
            const dataFormatada = dataObj.toLocaleDateString('pt-BR', {timeZone: 'UTC'});

            dadosAluno.nome = nome;
            dadosAluno.cpf = cpf;
            dadosAluno.nascFormatada = dataFormatada;
            dadosAluno.dataHoje = new Date().toLocaleDateString('pt-BR');

            // Mostrar pré-visualização
            document.getElementById('preview-nome').innerText = dadosAluno.nome;
            document.getElementById('preview-cpf').innerText = dadosAluno.cpf;
            document.getElementById('preview-nasc').innerText = dadosAluno.nascFormatada;
            document.getElementById('preview-data').innerText = dadosAluno.dataHoje;

            document.getElementById('dados-usuario').style.display = 'none';
            document.getElementById('preview-area').style.display = 'block';
            document.getElementById('btn-download').style.display = 'none';
            document.getElementById('msg-aluno').innerText = `Verifique os dados abaixo e aprove ou edite.`;
        }

        function editarDados() {
            document.getElementById('preview-area').style.display = 'none';
            document.getElementById('dados-usuario').style.display = 'flex';
            document.getElementById('btn-download').style.display = 'none';
            document.getElementById('msg-aluno').innerText = `Confirme seus dados para emissão.`;
        }

        function aprovarCertificado() {
            // Gerar QR Code de validação
            const urlVerificacao = `https://joseleblanc.github.io/montagemcomputador/verific.html?id=${encodeURIComponent(dadosAluno.id)}&nome=${encodeURIComponent(dadosAluno.nome)}&cpf=${encodeURIComponent(dadosAluno.cpf)}&nasc=${encodeURIComponent(document.getElementById('input-nasc').value)}`;
            document.getElementById('qrcode-box').innerHTML = '';
            new QRCode(document.getElementById('qrcode-box'), { text: urlVerificacao, width: 150, height: 150 });

            document.getElementById('preview-area').style.display = 'none';
            document.getElementById('btn-download').style.display = 'block';
            document.getElementById('msg-aluno').innerText = `Dados aprovados! Clique abaixo para baixar.`;
        }

function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
            const width = doc.internal.pageSize.getWidth();
            const height = doc.internal.pageSize.getHeight();

            const { nome, cpf, nascFormatada, dataHoje } = dadosAluno;

            // 1. MOLDURA
            doc.setDrawColor(0, 51, 102); 
            doc.setLineWidth(0.7);
            doc.rect(10, 10, width - 20, height - 20); 
            doc.setDrawColor(184, 134, 11); 
            doc.setLineWidth(0.2);
            doc.rect(12, 12, width - 24, height - 24); 

            // 2. TÍTULO
            doc.setFont("times", "bold");
            doc.setFontSize(40);
            doc.setTextColor(0, 51, 102);
            doc.text("CERTIFICADO DE CONCLUSÃO", width / 2, 40, { align: "center" });

            // 3. TEXTO
            doc.setFont("times", "normal");
            doc.setFontSize(16);
            doc.setTextColor(50, 50, 50);
            doc.text("Certificamos, para os devidos fins, que o(a) aluno(a)", width / 2, 60, { align: "center" });

            doc.setFont("times", "bold");
            doc.setFontSize(30);
            doc.setTextColor(0, 0, 0);
            doc.text(nome.toUpperCase(), width / 2, 75, { align: "center" });

            doc.setFont("times", "normal");
            doc.setFontSize(16);
            const textoCorpo = `concluiu com aproveitamento técnico o curso livre de capacitação em Montagem e Manutenção de Computadores, portador(a) do CPF nº ${cpf} e nascido(a) em ${nascFormatada}.`;
            const linhasTexto = doc.splitTextToSize(textoCorpo, 220);
            doc.text(linhasTexto, width / 2, 90, { align: "center" });

            doc.setFont("times", "bold");
            doc.text("Carga Horária Total: 20 Horas", width / 2, 115, { align: "center" });

            doc.setFont("times", "normal");
            doc.setFontSize(14);
            doc.text(`emitido em: ${dataHoje}`, width / 2, 135, { align: "center" });

            // --- AJUSTE DO QR CODE (SUBIU UM POUCO) ---
            const qrContainer = document.getElementById("qrcode-box");
            const canvas = qrContainer.querySelector("canvas");
            if (canvas) {
                const qrImage = canvas.toDataURL('image/png');
                // Posicionamento: X=245 (direita), Y=145 (subiu de 155/165 para 145)
                doc.addImage(qrImage, 'PNG', 245, 145, 30, 30);

                doc.setTextColor(100, 100, 100);
                doc.text("Valide este certificado", 260, 178, { align: "center" });
            }
