<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulos | Telecurso Montagem de PC</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --azul-escuro: #003366;
            --azul-claro: #0056b3;
            --amarelo: #ffcc00;
            --cinza-fundo: #f4f7f9;
            --verde: #25d366;
            --branco: #ffffff;
            --vermelho: #ff4444;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--azul-escuro);
            background-image: linear-gradient(180deg, #003366 0%, #0056b3 100%);
            background-attachment: fixed;
            margin: 0; 
            padding: 0; 
            color: #333;
        }

        header {
            background-color: var(--branco);
            color: var(--azul-escuro);
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid var(--amarelo);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        /* Barra de Alerta Dinâmica do Professor */
        #alerta-professor {
            display: none;
            background: var(--amarelo);
            color: var(--azul-escuro);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 25px;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            border-left: 6px solid var(--azul-escuro);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            animation: slideDown 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .painel-topo {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        }

        .info-aluno { flex: 1; min-width: 250px; }
        .info-aluno h2 { color: var(--azul-escuro); font-size: 1.4rem; margin-bottom: 5px; }

        .progresso-sessao { flex: 2; min-width: 300px; }

        .barra-fundo {
            background: #e0e0e0;
            height: 12px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
            border: 1px solid #ddd;
        }
        .barra-preenchimento {
            background: var(--verde);
            height: 100%;
            width: 0%;
            transition: width 1s ease-in-out;
        }

        .btn-acao {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            text-transform: uppercase;
        }

        .btn-sair { 
            background: transparent; 
            color: var(--vermelho); 
            font-size: 0.75rem; 
            border: 1px solid var(--vermelho);
        }
        .btn-sair:hover { background: var(--vermelho); color: white; }
        
        .btn-certificado {
            background: #bdc3c7;
            color: white;
            cursor: not-allowed;
            min-width: 200px;
        }

        .btn-certificado.liberado {
            background: var(--amarelo);
            color: var(--azul-escuro);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.5);
        }

        .grid-modulos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .card-modulo {
            background: var(--branco);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .card-modulo.bloqueado { opacity: 0.7; cursor: not-allowed; filter: grayscale(0.8); }
        .card-modulo:not(.bloqueado):hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.3); }

        .card-banner { 
            padding: 12px; 
            text-align: center; 
            background: var(--azul-claro); 
            color: white; 
            font-weight: bold; 
            font-size: 0.9rem;
        }
        
        .card-modulo.concluido { border-color: var(--verde); }
        .card-modulo.concluido .card-banner { background: var(--verde); }

        .card-modulo.ao-vivo {
            border: 2px solid var(--vermelho);
            background: #fffafa;
            animation: pulse-live 2s infinite;
        }
        .card-modulo.ao-vivo .card-banner { background: var(--vermelho); }

        @keyframes pulse-live {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        .card-corpo { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-corpo h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--azul-escuro); }
        .card-corpo p { font-size: 0.85rem; color: #666; margin-bottom: 15px; flex-grow: 1; }

        .status-aula { font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 90%;
            max-width: 450px;
        }
        .modal-content input { width: 100%; padding: 12px; margin: 8px 0 20px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; }

        /* WIDGET SUPORTE FLUTUANTE */
        #suporte-flutuante { position: fixed; bottom: 25px; right: 25px; z-index: 9999; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .btn-ajuda { 
            width: 60px; height: 60px; background: var(--azul-escuro); color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.3s; border: none;
        }
        .btn-ajuda:hover { transform: scale(1.1); }

        .painel-suporte { 
            display: none; position: absolute; bottom: 80px; right: 0; width: 320px; 
            background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            overflow: hidden; border: 1px solid #e2e8f0; animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-suporte { background: var(--azul-escuro); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .corpo-suporte { padding: 15px; }
        
        .input-suporte { width: 100%; border: 2px solid #f1f5f9; border-radius: 8px; padding: 10px; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; }
        .btn-enviar { width: 100%; background: var(--verde); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-enviar:hover { opacity: 0.9; }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-desktop"></i> TELECURSO <span style="font-weight: 300;">| Montagem de PC</span></h1>
</header>

<div class="container">
    
    <div id="alerta-professor">
        <i class="fas fa-bullhorn" style="font-size: 24px;"></i>
        <span id="texto-alerta">Carregando avisos importantes...</span>
        <button onclick="this.parentElement.style.display='none'" style="margin-left: auto; background: none; border: none; cursor: pointer; color: var(--azul-escuro); font-size: 18px;">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div class="painel-topo">
        <div class="info-aluno">
            <h2 id="nome-aluno"><i class="fas fa-user-circle"></i> Aluno</h2>
            <button class="btn-acao btn-sair" onclick="sair()">Sair da Sala</button>
        </div>

        <div class="progresso-sessao">
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <strong style="color: var(--azul-escuro)">Seu Progresso</strong>
                    <span id="status-prova-topo" style="display:block; font-size: 0.9rem; font-weight: bold; margin-top: 5px;"></span>
                </div>
                <span id="txt-porcentagem" style="color: var(--verde); font-weight: bold; font-size: 1.2rem;">0%</span>
            </div>
            <div class="barra-fundo">
                <div id="barra-progresso" class="barra-preenchimento"></div>
            </div>
            <small style="color: #666;"><i class="fas fa-info-circle"></i> Conclua as aulas e atinja 70 pontos na prova para o diploma.</small>
        </div>

        <div>
            <button id="btn-certificado" class="btn-acao btn-certificado" disabled>
                <i class="fas fa-certificate"></i> Certificado bloqueado
            </button>
        </div>
    </div>

    <div class="grid-modulos" id="grid-modulos"></div>
</div>

<!-- WIDGET SUPORTE FLUTUANTE -->
<div id="suporte-flutuante">
    <div id="painel-duvida" class="painel-suporte">
        <div class="header-suporte">
            <div style="display:flex; flex-direction:column; gap:4px;">
                <span><i class="fas fa-comment-dots"></i> Suporte ao Aluno</span>
                <div style="display:flex; align-items:center; gap:10px; font-size:12px; color:#f1f5f9;">
                    <span style="background: rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 6px;" id="ticket-info">Ticket: -</span>
                    <span id="ticket-status" style="background: rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 6px;">Status: aguardando</span>
                </div>
            </div>
            <i class="fas fa-times" onclick="toggleDuvida()" style="cursor:pointer;"></i>
        </div>
        <div class="corpo-suporte">
            <div id="chat-box-aluno" style="height:200px; overflow-y:auto; margin-bottom:10px; border-bottom:1px solid #eee;"></div>
            <textarea id="txt-pergunta" class="input-suporte" rows="3" placeholder="Digite sua mensagem..." style="resize: none;"></textarea>
            <div style="display:flex; justify-content:space-between; gap:10px; align-items:center;">
                <button id="btn-enviar-duvida" onclick="enviarDuvidaParaSupabase()" class="btn-enviar">ENVIAR</button>
                <button id="btn-excluir-ticket" onclick="excluirTicketAluno()" class="btn-enviar" style="background:#ef4444;">EXCLUIR TICKET</button>
            </div>
        </div>
    </div>

    <button class="btn-ajuda" onclick="toggleDuvida()" title="Dúvidas?" style="position:relative;">
        <i class="fas fa-question"></i>
        <span id="badge-novas-mensagens" style="display:none; position:absolute; top:-8px; right:-8px; background:#ef4444; color:white; border-radius:50%; width:20px; height:20px; font-size:12px; line-height:20px; text-align:center; font-weight:bold;"></span>
    </button>
</div>

<div id="modal-dados" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color: var(--azul-escuro)"><i class="fas fa-id-card"></i> Dados do Diploma</h2>
        <label><b>Nome Completo:</b></label>
        <input type="text" id="input-nome">
        <label><b>CPF:</b></label>
        <input type="text" id="input-cpf" placeholder="000.000.000-00">
        <label><b>Data de Nascimento:</b></label>
        <input type="date" id="input-nasc">
        <button class="btn-acao" style="background: var(--verde); color:white; width: 100%;" onclick="gerarPDF()">BAIXAR AGORA</button>
        <button style="background:none; border:none; width:100%; margin-top:15px; cursor:pointer; color: #999;" onclick="fecharModal()">Voltar</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ityqcemfbdzgsfmyisqc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_p6rMiOpEoL6smdIXgOaclQ_TNK0MwNA';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const modulos = [
        { id: 999, t: "SALA DE AULA AO VIVO", d: "Entre na chamada de vídeo para aulas em tempo real e compartilhamento de tela." },
        { id: 0, t: "Introdução ao Curso", d: "Boas-vindas e como aproveitar o Telecurso." },
        { id: 1, t: "Conhecendo as peças", d: "Identificação de componentes e funções." },
        { id: 2, t: "Separando ferramentas", d: "O que não pode faltar na bancada." },
        { id: 3, t: "Cuidados de segurança", d: "Eletricidade estática e proteção." },
        { id: 4, t: "Montando o processador", d: "Encaixe da CPU e pasta térmica." },
        { id: 5, t: "Montando a memória RAM", d: "Dual Channel e travas de segurança." },
        { id: 6, t: "Montando a placa no Gabinete", d: "Espelho e parafusos de fixação." },
        { id: 7, t: "Fonte de alimentação", d: "Instalação da PSU e roteamento." },
        { id: 8, t: "Montando armazenamento", d: "SSD SATA e M.2 NVMe." },
        { id: 9, t: "Montando Placa de vídeo", d: "Slot PCI-e e alimentação extra." },
        { id: 10, t: "Coolers de gabinete", d: "Configurando o fluxo de ar." },
        { id: 11, t: "Primeiro boot de testes", d: "BIOS e conferência inicial." },
        { id: 12, t: "Formatação com Windows", d: "Instalação do sistema operacional." },
        { id: 13, t: "Vídeos Tutoriais", d: "Demonstrações práticas em vídeo passo a passo." },
        { id: 14, t: "Conclusão", d: "Encerramento e orientações para o mercado." },
        { id: 100, t: "PROVA FINAL", d: "Avaliação final de certificação técnica." }
    ];

    async function inicializar() {
        // --- NOVO: CHECAGEM DE MANUTENÇÃO E AVISOS ---
        const { data: config, error: errC } = await _supabase.from('configuracoes').select('*');
        
        if (!errC && config) {
            // Se modo manutenção estiver ligado, bloqueia tudo
            const manutencao = config.find(c => c.chave === 'modo_manutencao')?.valor;
            if (manutencao === "true") {
                document.body.innerHTML = `
                    <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #003366; color: white; font-family: sans-serif; text-align: center; padding: 20px;">
                        <i class="fas fa-tools" style="font-size: 80px; color: #ffcc00; margin-bottom: 20px;"></i>
                        <h1>Manutenção em curso</h1>
                        <p>Estamos a atualizar o Telecurso para uma melhor experiência.<br>Voltamos em poucos minutos!</p>
                        <button onclick="location.reload()" style="margin-top:20px; padding:12px 25px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; background:#ffcc00; color:#003366;">TENTAR NOVAMENTE</button>
                    </div>`;
                return;
            }

            // Exibe aviso global do professor
            const aviso = config.find(c => c.chave === 'recado_geral_modulos')?.valor;
            if (aviso && aviso.trim() !== "") {
                document.getElementById('alerta-professor').style.display = 'flex';
                document.getElementById('texto-alerta').innerText = aviso;
            } else {
                document.getElementById('alerta-professor').style.display = 'none';
            }
        }

        // --- LÓGICA ORIGINAL DE USUÁRIO E PROGRESSO ---
        const { data: userData, error: userError } = await _supabase.auth.getUser();
        const user = userData?.user;
        if (userError || !user) { window.location.href = "index.html"; return; }

        localStorage.setItem('user_email', user.email);

        document.getElementById('nome-aluno').innerHTML = `<i class="fas fa-user-circle"></i> Olá, ${user.email.split('@')[0]}!`;
        
        const { data: progresso } = await _supabase.from('progresso_alunos').select('*').eq('user_id', user.id);
        const concluidos = progresso ? progresso.map(p => p.modulo_id) : [];
        
        const concluidosConteudo = concluidos.filter(id => id >= 0 && id <= 14);
        const pct = Math.round((concluidosConteudo.length / 15) * 100);
        document.getElementById('barra-progresso').style.width = pct + "%";
        document.getElementById('txt-porcentagem').innerText = pct + "%";
        
        const registroProva = progresso ? progresso.find(p => p.modulo_id === 100) : null;
        if(registroProva) {
            document.getElementById('status-prova-topo').innerHTML = `Nota da Prova: <span style="color:${registroProva.nota >= 70 ? 'var(--verde)' : 'var(--vermelho)'}">${registroProva.nota}/100</span>`;
        }
        
        renderizar(concluidos, registroProva ? registroProva.nota : null);
        await atualizarBadgeNovasMensagens();
        await verificarLiberacaoCertificado();
    }

    function renderizar(concluidos, nota) {
        const grid = document.getElementById('grid-modulos');
        grid.innerHTML = modulos.map((m) => {
            const isProva = m.id === 100;
            const isAoVivo = m.id === 999;
            const isConcluido = concluidos.includes(m.id);
            const isReprovado = isProva && nota !== null && nota < 70;
            
            let isBloqueado = false;
            let link = "";

            if (isAoVivo) {
                link = 'aula-viva.html';
            } else if (m.id === 0) {
                link = 'aulas/aula0.html';
            } else if (isProva) {
                link = 'prova-final.html';
                isBloqueado = !concluidos.includes(14);
            } else {
                link = `aulas/aula${m.id}.html`;
                isBloqueado = !concluidos.includes(m.id - 1);
            }
            
            let statusTexto = isConcluido ? 'CONCLUÍDO' : (isBloqueado ? 'BLOQUEADO' : 'INICIAR →');
            let statusIcone = isConcluido ? 'fa-check-circle' : (isBloqueado ? 'fa-lock' : (isAoVivo ? 'fa-video' : 'fa-play-circle'));
            let corStatus = isConcluido ? 'var(--verde)' : (isBloqueado ? '#888' : (isAoVivo ? 'var(--vermelho)' : 'var(--azul-claro)'));

            if (isReprovado) {
                statusTexto = 'REFAZER PROVA';
                statusIcone = 'fa-redo';
                corStatus = 'var(--vermelho)';
            }

            return `
                <div class="card-modulo ${isBloqueado ? 'bloqueado' : ''} ${isAoVivo ? 'ao-vivo' : ''} ${isConcluido && !isReprovado ? 'concluido' : ''}" 
                     onclick="${isBloqueado ? '' : `location.href='${link}'`}">
                    <div class="card-banner">
                        ${isAoVivo ? '<i class="fas fa-circle" style="font-size:7px"></i> AO VIVO' : (isProva ? 'AVALIAÇÃO' : `MÓDULO ${String(m.id).padStart(2, '0')}`)}
                    </div>
                    <div class="card-corpo">
                        <h3>${m.t}</h3>
                        <p>${m.d} ${isProva && nota !== null ? `<br><b>Última nota: ${nota}/100</b>` : ''}</p>
                        <span class="status-aula" style="color:${corStatus}">
                            <i class="fas ${statusIcone}"></i> ${isAoVivo ? 'ENTRAR NA SALA' : statusTexto}
                        </span>
                    </div>
                </div>`;
        }).join('');
    }



    async function toggleDuvida() {
        const painel = document.getElementById('painel-duvida');
        if (painel.style.display === 'none' || painel.style.display === '') {
            painel.style.display = 'block';
            carregarHistoricoAluno();
        } else {
            painel.style.display = 'none';
        }
    }

    function iniciarRealtimeModulos() {
        try {
            _supabase.channel('realtime-chat-modulos')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_suporte' }, payload => {
                    const userEmail = localStorage.getItem('user_email') || 'aluno@teste.com';
                    const ticketAluno = gerarTicketAluno(userEmail);
                    const novo = payload.new;
                    if (novo.ticket === ticketAluno || novo.aluno_email === userEmail) {
                        carregarHistoricoAluno();
                    }
                    atualizarBadgeNovasMensagens();
                })
                .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chat_suporte' }, payload => {
                    atualizarBadgeNovasMensagens();
                    const userEmail = localStorage.getItem('user_email') || 'aluno@teste.com';
                    const ticketAluno = gerarTicketAluno(userEmail);
                    const upd = payload.new;
                    if (upd.ticket === ticketAluno || upd.aluno_email === userEmail) {
                        carregarHistoricoAluno();
                    }
                })
                .subscribe();
        } catch (e) {
            console.warn('Realtime Modulos não disponível:', e);
        }
    }

    function gerarTicketAluno(email) {
        // ticket determinístico por email (mesmo aluno sempre recebe mesmo ticket)
        const base = [...email].reduce((acc, c) => acc + c.charCodeAt(0), 0);
        const num = 10 + (base % 890); // 0010-0899
        return `TICKET-${String(num).padStart(4, '0')}`;
    }

    async function atualizarBadgeNovasMensagens() {
        const userEmail = localStorage.getItem('user_email') || "aluno@teste.com";
        const ticketAluno = gerarTicketAluno(userEmail);

        let count = 0;
        const { data: ticketRow, error } = await _supabase
            .from('chat_suporte')
            .select('conversation')
            .eq('ticket', ticketAluno)
            .single();

        if (!error && ticketRow && Array.isArray(ticketRow.conversation)) {
            count = ticketRow.conversation.filter(msg => msg.remetente !== 'aluno' && !msg.lida).length;
        } else {
            // fallback antigo modelo (linhas individuais)
            const { data, error: oldError } = await _supabase
                .from('chat_suporte')
                .select('id')
                .eq('ticket', ticketAluno)
                .neq('remetente', 'aluno')
                .eq('lida', false);
            count = (!oldError && data) ? data.length : 0;
        }

        const contadorElement = document.getElementById('badge-novas-mensagens');
        if (count > 0) {
            contadorElement.innerText = count;
            contadorElement.style.display = 'inline-flex';
        } else {
            contadorElement.style.display = 'none';
        }
    }

    function atualizarTicketLabel(ticket, status) {
        document.getElementById('ticket-info').innerText = `Ticket: ${ticket}`;
        document.getElementById('ticket-status').innerText = `Status: ${status}`;

        const statusColor = {
            aguardando: '#ef4444',
            'em-atendimento': '#f59e0b',
            concluido: '#16a34a',
            'nao-atendido': '#7c3aed'
        }[status] || '#6b7280';

        document.getElementById('ticket-status').style.background = statusColor;
        document.getElementById('ticket-status').style.color = 'white';
    }

    async function carregarHistoricoAluno() {
        const userEmail = localStorage.getItem('user_email') || "aluno@teste.com";
        const ticketAluno = gerarTicketAluno(userEmail);

        const { data: ticketRow, error } = await _supabase
            .from('chat_suporte')
            .select('*')
            .eq('ticket', ticketAluno)
            .single();

        let chat = [];

        if (!error && ticketRow && Array.isArray(ticketRow.conversation)) {
            chat = ticketRow.conversation;

            // marcar como lido apenas as mensagens do instrutor
            const updatedConversation = chat.map(msg => msg.remetente !== 'aluno' ? { ...msg, lida: true } : msg);
            await _supabase
                .from('chat_suporte')
                .update({ conversation: updatedConversation, lida: true, status: ticketRow.status || 'aguardando' })
                .eq('ticket', ticketAluno);

            chat = updatedConversation;
        } else {
            // suporte ao modelo antigo
            let response = await _supabase
                .from('chat_suporte')
                .select('*')
                .or(`ticket.eq.${ticketAluno},aluno_email.eq.${userEmail}`)
                .order('created_at', { ascending: true });

            if (response.error) {
                console.warn('Consulta com ticket falhou, fallback para email:', response.error);
                const fallback = await _supabase
                    .from('chat_suporte')
                    .select('*')
                    .eq('aluno_email', userEmail)
                    .order('created_at', { ascending: true });
                chat = fallback.data || [];
            } else {
                chat = response.data || [];
            }

            // atualizar flag lida para mensagens do instrutor nesse modelo
            await _supabase
                .from('chat_suporte')
                .update({ lida: true })
                .eq('ticket', ticketAluno)
                .neq('remetente', 'aluno');
        }

        const statusTicket = (ticketRow && ticketRow.status) ? ticketRow.status : 'aguardando';
        atualizarTicketLabel(ticketAluno, statusTicket);

        const corpo = document.querySelector('.corpo-suporte');
        let chatBox = document.getElementById('chat-box-aluno');
        if (!chatBox) {
            corpo.innerHTML = `<div id="chat-box-aluno" style="height:200px; overflow-y:auto; margin-bottom:10px; border-bottom:1px solid #eee;"></div>` + corpo.innerHTML;
            chatBox = document.getElementById('chat-box-aluno');
        }

        chatBox.innerHTML = (chat || []).map(m => `
            <div style="text-align: ${m.remetente === 'aluno' ? 'right' : 'left'}; margin-bottom: 8px;">
                <span style="display:inline-block; padding:8px; border-radius:8px; background:${m.remetente === 'aluno' ? '#dcf8c6' : '#f1f5f9'}; font-size:13px;">
                    ${m.mensagem}
                </span>
            </div>
        `).join('');
        chatBox.scrollTop = chatBox.scrollHeight;

        await atualizarBadgeNovasMensagens();
    }

    async function enviarDuvidaParaSupabase() {
        const msg = document.getElementById('txt-pergunta').value;
        const userEmail = localStorage.getItem('user_email') || "aluno@teste.com";
        if (!msg.trim()) return;

        const ticketAluno = gerarTicketAluno(userEmail);
        const now = new Date().toISOString();
        const mensagemObj = { remetente: 'aluno', mensagem: msg, created_at: now, lida: false };

        const { data: existing, error } = await _supabase
            .from('chat_suporte')
            .select('*')
            .eq('ticket', ticketAluno)
            .single();

        if (error || !existing) {
            // Criar novo ticket com conversa
            const insert = await _supabase.from('chat_suporte').insert([{ ticket: ticketAluno, aluno_email: userEmail, status: 'aguardando', conversation: [mensagemObj], lida: false }]);
            if (insert.error) {
                console.error('Não foi possível enviar a mensagem:', insert.error);
                alert('Erro ao enviar a mensagem. Tente novamente.');
                return;
            }
        } else if (existing.conversation && Array.isArray(existing.conversation)) {
            const novaConversa = [...existing.conversation, mensagemObj];
            const update = await _supabase.from('chat_suporte').update({ conversation: novaConversa, status: existing.status || 'aguardando', lida: false }).eq('ticket', ticketAluno);
            if (update.error) {
                console.error('Não foi possível atualizar a mensagem:', update.error);
                alert('Erro ao enviar a mensagem. Tente novamente.');
                return;
            }
        } else {
            // fallback: migrar modelo antigo para conversa única
            let baseConversation = [];
            if (existing.mensagem) {
                baseConversation.push({ remetente: existing.remetente || 'aluno', mensagem: existing.mensagem, created_at: existing.created_at || now, lida: existing.lida || false });
            }
            const novaConversa = [...baseConversation, mensagemObj];
            const upsert = await _supabase.from('chat_suporte').upsert({ ticket: ticketAluno, aluno_email: userEmail, status: existing.status || 'aguardando', conversation: novaConversa, lida: false }, { onConflict: 'ticket' });
            if (upsert.error) {
                console.error('Não foi possível enviar a mensagem:', upsert.error);
                alert('Erro ao enviar a mensagem. Tente novamente.');
                return;
            }
        }

        document.getElementById('txt-pergunta').value = "";
        carregarHistoricoAluno();
        await atualizarBadgeNovasMensagens();
    }

    async function excluirTicketAluno() {
        const userEmail = localStorage.getItem('user_email') || "aluno@teste.com";
        const ticketAluno = gerarTicketAluno(userEmail);
        if (!confirm(`Tem certeza de que deseja excluir o ticket ${ticketAluno}? Esta ação não pode ser desfeita.`)) return;

        const { error } = await _supabase.from('chat_suporte').delete().eq('ticket', ticketAluno);
        if (error) {
            console.error('Erro ao excluir ticket:', error);
            alert('Não foi possível excluir o ticket. Tente novamente.');
            return;
        }

        document.getElementById('txt-pergunta').value = "";
        carregarHistoricoAluno();
        await atualizarBadgeNovasMensagens();
        alert('Ticket excluído com sucesso.');
    }

    async function sair() { await _supabase.auth.signOut(); window.location.href = "index.html"; }

    inicializar();
    iniciarRealtimeModulos();

    // Verifica atualizações do professor (manutenção/avisos) e notificações a cada 3 segundos
    setInterval(() => {
        inicializar();
        atualizarBadgeNovasMensagens();
        const painel = document.getElementById('painel-duvida');
        if (painel.style.display === 'block') carregarHistoricoAluno();
    }, 3000);




async function verificarLiberacaoCertificado() {
    const { data: userData, error: userError } = await _supabase.auth.getUser();
    const user = userData?.user;
    if (userError || !user) return;

    const btn = document.getElementById('btn-certificado');
    btn.disabled = true;
    btn.classList.remove('liberado');
    btn.style.cursor = 'not-allowed';
    btn.style.pointerEvents = 'none';
    btn.innerHTML = '<i class="fas fa-certificate"></i> Certificado bloqueado';

    // Verificar prova final
    const { data: prova, error: provaError } = await _supabase
        .from('progresso_alunos')
        .select('nota, concluido')
        .eq('user_id', user.id)
        .eq('modulo_id', 100)
        .single();

    // Verificar presença na aula ao vivo
    const { data: presenca, error: presencaError } = await _supabase
        .from('chamadas_aula')
        .select('id')
        .eq('user_id', user.id)
        .limit(1);

    console.log('Verificação certificado:', { prova, presenca, provaError, presencaError });

    if (!provaError && prova && prova.concluido && prova.nota >= 70 && !presencaError && presenca && presenca.length > 0) {
        btn.disabled = false;
        btn.classList.add('liberado');
        btn.style.cursor = 'pointer';
        btn.style.pointerEvents = 'auto';
        btn.innerHTML = '<i class="fas fa-certificate"></i> Emitir Certificado';

        btn.onclick = () => {
            window.location.href = 'certificado.html';
        };

        document.getElementById('status-prova-topo').innerHTML += ' <strong style="color:var(--verde);">(Certificado liberado)</strong>';
    } else {
        let motivo = '';
        if (provaError || !prova || !prova.concluido || prova.nota < 70) {
            motivo = 'Prova final não aprovada';
        } else if (presencaError || !presenca || presenca.length === 0) {
            motivo = 'Presença na aula ao vivo não confirmada';
        }
        document.getElementById('status-prova-topo').innerHTML += ` <strong style="color:var(--vermelho);">(${motivo})</strong>`;
    }
}
